<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hola Mundo</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #111;
        }

        h1 {
            font-size: 4rem;
            font-family: Arial, sans-serif;
            animation: arcoiris 3s linear infinite;
        }

        @keyframes arcoiris {
            0%   { color: red; }
            16%  { color: orange; }
            33%  { color: yellow; }
            50%  { color: green; }
            66%  { color: blue; }
            83%  { color: indigo; }
            100% { color: red; }
        }
    </style>
</head>
<body>
    <h1>Hola Mundo</h1>
</body>
</html>
